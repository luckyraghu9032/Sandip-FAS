services:
  # ─── Backend: Node.js Web Service ──────────────────────────────────────────
  # URL: https://sandip-fas-aiandml.onrender.com
  - type: web
    name: sandip-fas-aiandml
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # ─── Frontend: Static Site ─────────────────────────────────────────────────
  # URL: https://sandip-fas-backend.onrender.com
  - type: web
    name: sandip-fas-backend
    env: static
    rootDir: frontend
    staticPublishPath: .
    buildCommand: ""
    routes:
      - type: rewrite
        source: /hod-dashboard.html
        destination: /hod-dashboard.html
      - type: rewrite
        source: /coordinator-dashboard.html
        destination: /coordinator-dashboard.html
      - type: rewrite
        source: /student-dashboard.html
        destination: /student-dashboard.html

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | FAS Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/student.css">
  <link rel="icon" type="image/svg+xml" href="public/favicon.svg">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-container" style="max-width:100%;padding:0 2rem">
      <div class="navbar-brand">
        <i data-lucide="book-open" class="icon text-violet"></i>
        <div class="brand-text">
          <span class="brand-title">Sandip University</span>
          <span class="brand-subtitle">Student Portal</span>
        </div>
      </div>
      <div class="user-profile-nav">
        <div class="user-name-desktop text-muted" id="user-display-name"></div>
        <div class="profile-avatar avatar-violet" id="user-avatar" title="Toggle Menu">
          <i data-lucide="user" class="icon-sm"></i>
        </div>
      </div>
    </div>
  </nav>

  <div class="sidebar-overlay"></div>

  <div class="dashboard-container">
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link" data-section="handbook">
          <i data-lucide="book" class="icon-sm"></i>
          Handbook Cover
        </a>
        <a href="#" class="sidebar-link" data-section="index">
          <i data-lucide="list" class="icon-sm"></i>
          Index
        </a>
        <a href="#" class="sidebar-link" data-section="profile">
          <i data-lucide="user" class="icon-sm"></i>
          Student Details
        </a>
        <a href="#" class="sidebar-link" data-section="academic">
          <i data-lucide="bar-chart-2" class="icon-sm"></i>
          Academic Progress
        </a>
        <a href="#" class="sidebar-link" data-section="mentor-info">
          <i data-lucide="users" class="icon-sm"></i>
          Mentor Information
        </a>
        <a href="#" class="sidebar-link" data-section="meeting">
          <i data-lucide="file-text" class="icon-sm"></i>
          Meeting Report
        </a>
        <a href="#" class="sidebar-link" data-section="vision">
          <i data-lucide="star" class="icon-sm"></i>
          Vision-Mission
        </a>
        <a href="#" class="sidebar-link" data-section="fas" style="background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(37,99,235,0.08));border:1px solid rgba(124,58,237,0.2);margin-top:0.5rem">
          <i data-lucide="download" class="icon-sm"></i>
          Download FAS
        </a>
        <div class="sidebar-footer-actions">
          <a href="#" class="sidebar-link" onclick="openModal('change-password-modal')">
            <i data-lucide="lock" class="icon-sm"></i>
            Change Password
          </a>
          <a href="#" class="sidebar-link logout-link" onclick="logout()">
            <i data-lucide="log-out" class="icon-sm"></i>
            Logout
          </a>
        </div>
      </nav>
    </aside>

    <main class="main-content">
      <div id="student-loading" class="text-muted" style="padding:2rem">Loading profile…</div>
      <div class="form-error" id="student-error" style="display:none;margin-bottom:1rem"></div>

      <!-- Handbook Cover -->
      <div id="section-handbook" style="display:none"></div>

      <!-- Index -->
      <div id="section-index" style="display:none"></div>

      <!-- Profile / Student Details -->
      <div id="section-profile" style="display:none"></div>

      <!-- Academic Progress -->
      <div id="section-academic" style="display:none"></div>

      <!-- Mentor Information -->
      <div id="section-mentor-info" style="display:none"></div>

      <!-- Meeting Report -->
      <div id="section-meeting" style="display:none"></div>

      <!-- Vision-Mission -->
      <div id="section-vision" style="display:none"></div>

      <!-- FAS PDF Download -->
      <div id="section-fas" style="display:none"></div>
    </main>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-backdrop" id="change-password-modal" style="display:none">
    <div class="modal-container">
      <div class="modal-content">
        <button class="modal-close" onclick="closeModal('change-password-modal')">
          <i data-lucide="x"></i>
        </button>
        <div class="modal-header">
          <div class="modal-icon-wrapper bg-violet-light">
            <i data-lucide="lock" class="icon-lg text-violet"></i>
          </div>
          <h2 class="modal-title">Change Password</h2>
          <p class="modal-subtitle">Update your account security credentials</p>
        </div>
        <form class="modal-form" id="change-password-form">
          <div class="form-group">
            <label for="currentPassword" class="form-label">Current Password</label>
            <div class="input-wrapper">
              <i data-lucide="shield-check" class="input-icon"></i>
              <input type="password" id="currentPassword" name="currentPassword" class="form-input" placeholder="••••••••" required>
            </div>
          </div>
          <div class="form-group">
            <label for="newPassword" class="form-label">New Password</label>
            <div class="input-wrapper">
              <i data-lucide="key" class="input-icon"></i>
              <input type="password" id="newPassword" name="newPassword" class="form-input" placeholder="••••••••" required>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm New Password</label>
            <div class="input-wrapper">
              <i data-lucide="check-circle" class="input-icon"></i>
              <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="••••••••" required>
            </div>
          </div>
          <div class="form-error" id="password-error" style="display:none"></div>
          <div class="form-success" id="password-success" style="display:none"></div>
          <button type="submit" class="btn btn-primary btn-block">
            <span>Update Password</span>
            <i data-lucide="save"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/fas-pdf.js"></script>
  <script src="js/student-dashboard-app.js"></script>
  <script>
    const user = checkAuth('student');
    if (user) {
      document.getElementById('user-display-name').textContent = user.name;
      lucide.createIcons();
    }
  </script>
</body>
</html>
